<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#212121">
    <title>Kiro Mobile</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <div class="sb-header">
            <span class="sb-brand"><i class="fas fa-bolt"></i> Kiro</span>
            <button id="btn-sb-close" class="btn-icon"><i class="fas fa-xmark"></i></button>
        </div>
        <nav class="sb-nav">
            <div class="sb-label">Chats</div>
            <div id="chat-list" class="chat-list"></div>
            <div class="sb-divider"></div>
            <div class="sb-label">Navegação</div>
            <button class="sb-link" data-tab="actions"><i class="fas fa-grid"></i> Ações Rápidas</button>
            <button class="sb-link" data-tab="files"><i class="fas fa-folder"></i> Projetos & Git</button>
        </nav>
        <div class="sb-footer">
            <button id="btn-theme" class="sb-link"><i class="fas fa-moon" id="theme-icon"></i> <span id="theme-label">Modo Claro</span></button>
        </div>
    </aside>
    <div id="sb-overlay" class="overlay hidden"></div>

    <!-- Content -->
    <main class="content">
        <header class="topbar">
            <button id="btn-menu" class="btn-icon"><i class="fas fa-bars"></i></button>
            <span class="topbar-title" id="topbar-title">Kiro</span>
            <span class="topbar-badge" id="project-badge">interface-kiro</span>
        </header>

        <!-- Tab: Chat -->
        <section id="tab-chat" class="tab active">
            <div class="chat-area" id="chat-area">
                <div class="chat-welcome" id="chat-welcome">
                    <div class="welcome-icon"><i class="fas fa-bolt"></i></div>
                    <h2>Kiro Mobile</h2>
                    <p>Chat direto com o Kiro AI. Suas mensagens têm impacto real nos seus projetos.</p>
                    <div class="welcome-chips">
                        <button class="chip-btn" data-msg="Liste os arquivos do projeto">📁 Listar arquivos</button>
                        <button class="chip-btn" data-msg="Explique a estrutura do projeto">🔍 Estrutura</button>
                        <button class="chip-btn" data-msg="Quais melhorias você sugere?">💡 Sugestões</button>
                    </div>
                </div>
                <div id="chat-messages"></div>
            </div>
            <div id="typing-indicator" class="typing hidden">
                <div class="typing-dots"><span></span><span></span><span></span></div>
                <span>Kiro está pensando...</span>
            </div>
            <div class="chat-input-area">
                <div class="input-bar">
                    <button id="btn-mic-chat" class="btn-icon mic-btn"><i class="fas fa-microphone"></i></button>
                    <input type="text" id="chat-input" placeholder="Pergunte algo ao Kiro..." autocomplete="off">
                    <button id="btn-send" class="btn-icon send-btn"><i class="fas fa-arrow-up"></i></button>
                </div>
            </div>
        </section>

        <!-- Tab: Ações Rápidas -->
        <section id="tab-actions" class="tab">
            <div class="tab-scroll">
                <div class="section-title">Comandos Rápidos</div>
                <div class="grid-actions cols-2">
                    <button class="action-btn wide" data-msg="Liste todos os arquivos do projeto"><i class="fas fa-folder-tree"></i><span>Listar Arquivos</span></button>
                    <button class="action-btn wide" data-msg="Mostre o git status"><i class="fas fa-code-branch"></i><span>Git Status</span></button>
                    <button class="action-btn wide" data-msg="Explique a estrutura do projeto"><i class="fas fa-sitemap"></i><span>Estrutura</span></button>
                    <button class="action-btn wide" data-msg="Quais bugs ou problemas você encontra no código?"><i class="fas fa-bug"></i><span>Encontrar Bugs</span></button>
                    <button class="action-btn wide" data-msg="Sugira melhorias para o código"><i class="fas fa-lightbulb"></i><span>Sugestões</span></button>
                    <button class="action-btn wide" data-msg="Crie um resumo do README"><i class="fas fa-file-lines"></i><span>Resumo README</span></button>
                </div>
                <div class="section-title" style="margin-top:24px">Voz</div>
                <div class="grid-actions cols-2">
                    <button id="btn-voice-page" class="action-btn wide"><i class="fas fa-microphone"></i><span>Falar para o Kiro</span></button>
                    <button id="btn-tts-page" class="action-btn wide"><i class="fas fa-volume-high"></i><span>Ouvir texto</span></button>
                </div>
            </div>
        </section>

        <!-- Tab: Projetos -->
        <section id="tab-files" class="tab">
            <div class="tab-scroll">
                <div class="section-title">Seus Projetos</div>
                <div id="project-list" class="file-list"></div>

                <div class="section-title" style="margin-top:24px">Git — <span id="git-project-name" style="color:var(--green)">interface-kiro</span></div>
                <div class="git-actions">
                    <button id="btn-git-status" class="git-btn"><i class="fas fa-circle-info"></i> Status</button>
                    <button id="btn-git-push" class="git-btn green-btn"><i class="fas fa-arrow-up"></i> Push</button>
                    <button id="btn-git-pull" class="git-btn"><i class="fas fa-arrow-down"></i> Pull</button>
                </div>
                <div id="git-output" class="git-output" style="display:none"></div>
                <div id="commit-row" class="commit-row" style="display:none">
                    <input type="text" id="commit-msg" placeholder="Mensagem do commit..." value="update via Kiro Mobile">
                    <button id="btn-git-confirm-push" class="git-btn green-btn"><i class="fas fa-check"></i> Confirmar</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Sheet: Voz -->
    <div id="voice-sheet" class="bsheet hidden">
        <div class="bsheet-bar"></div>
        <div class="bsheet-head"><span id="voice-status">Toque para falar</span><button id="btn-close-voice" class="btn-icon"><i class="fas fa-xmark"></i></button></div>
        <div class="voice-center"><div id="voice-dot" class="voice-dot"><i class="fas fa-microphone"></i></div></div>
        <div class="transcript-box"><p id="transcript-text" class="muted">Sua fala aparecerá aqui...</p></div>
        <div class="bsheet-btns">
            <button id="btn-voice-send" class="pill green" disabled><i class="fas fa-paper-plane"></i> Enviar</button>
            <button id="btn-voice-clear" class="pill"><i class="fas fa-eraser"></i> Limpar</button>
        </div>
        <div class="bsheet-opts">
            <label><input type="checkbox" id="voice-auto-send" checked> Auto-enviar</label>
            <select id="voice-lang"><option value="pt-BR">Português</option><option value="en-US">English</option><option value="es-ES">Español</option></select>
        </div>
    </div>

    <!-- Bottom Sheet: TTS -->
    <div id="tts-sheet" class="bsheet hidden">
        <div class="bsheet-bar"></div>
        <div class="bsheet-head"><span>Texto → Áudio</span><button id="btn-close-tts" class="btn-icon"><i class="fas fa-xmark"></i></button></div>
        <textarea id="tts-text" class="tts-box" placeholder="Cole o texto aqui..."></textarea>
        <div class="bsheet-btns">
            <button id="btn-tts-play" class="pill green"><i class="fas fa-play"></i> Ouvir</button>
            <button id="btn-tts-stop" class="pill" disabled><i class="fas fa-stop"></i> Parar</button>
            <button id="btn-tts-paste" class="pill"><i class="fas fa-clipboard"></i> Colar</button>
        </div>
    </div>

    <script type="module">
        import { VoiceModule } from '/static/js/voice.js';
        const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
        let currentProject="interface-kiro", sending=false;
        const voice={mod:null,last:""};

        // ── Chat ──
        function addMsg(type,text){
            const w=$("#chat-welcome"); if(w)w.style.display="none";
            const area=$("#chat-messages"),div=document.createElement("div");
            div.className="chat-msg "+type;
            const html=type==="user"
                ?`<div class="msg-bubble user-bubble">${esc(text)}</div>`
                :`<div class="msg-bubble sys-bubble">${formatResponse(text)}</div>`;
            div.innerHTML=html;
            area.appendChild(div);
            $("#chat-area").scrollTop=$("#chat-area").scrollHeight;
        }
        function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
        function formatResponse(s){
            // Básico: preserva quebras de linha e código
            return esc(s).replace(/\n/g,"<br>").replace(/`([^`]+)`/g,"<code>$1</code>");
        }

        async function sendMsg(text){
            if(!text||sending)return;
            sending=true;
            addMsg("user",text);
            $("#chat-input").value="";
            $("#typing-indicator").classList.remove("hidden");
            $("#btn-send").disabled=true;

            try{
                const res=await fetch("/api/chat",{
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({message:text,project:currentProject})
                });
                const data=await res.json();
                if(data.error){addMsg("system","⚠️ "+data.error);}
                else{addMsg("system",data.response||"(sem resposta)");}
            }catch(e){addMsg("system","Erro de conexão: "+e.message);}
            finally{
                sending=false;
                $("#typing-indicator").classList.add("hidden");
                $("#btn-send").disabled=false;
            }
        }

        // ── Projetos ──
        const chatHistories = {}; // guarda mensagens por projeto

        async function loadProjects(){
            try{
                const res=await fetch("/api/projects");
                const projects=await res.json();
                const list=$("#project-list");
                const chatList=$("#chat-list");
                list.innerHTML="";
                chatList.innerHTML="";
                projects.forEach(p=>{
                    // Lista na aba projetos
                    list.innerHTML+=`<div class="file-item" data-project="${p.name}"><i class="fas fa-folder-open"></i><div><strong>${p.name}</strong><small>${p.path}</small></div></div>`;
                    // Chat na sidebar
                    chatList.innerHTML+=`<button class="chat-item${p.name===currentProject?" active":""}" data-project="${p.name}"><i class="fas fa-message"></i> ${p.name}</button>`;
                    // Inicializa histórico
                    if(!chatHistories[p.name]) chatHistories[p.name]=[];
                });
                // Click nos chats da sidebar
                $$(".chat-item[data-project]").forEach(el=>el.addEventListener("click",()=>{
                    switchProject(el.dataset.project);
                }));
                // Click nos projetos da aba
                $$(".file-item[data-project]").forEach(el=>el.addEventListener("click",()=>{
                    switchProject(el.dataset.project);
                }));
            }catch(e){}
        }

        function updateChatList(){
            $$(".chat-item[data-project]").forEach(el=>{
                el.classList.toggle("active",el.dataset.project===currentProject);
            });
        }

        // ── Tabs ──
        function switchTab(t){
            $$(".sb-link[data-tab]").forEach(b=>b.classList.remove("active"));
            if(t!=="chat") $$(`.sb-link[data-tab="${t}"]`).forEach(b=>b.classList.add("active"));
            $$(".tab").forEach(x=>x.classList.remove("active"));
            $(`#tab-${t}`).classList.add("active");
            $("#topbar-title").textContent={chat:"Kiro",actions:"Ações Rápidas",files:"Projetos & Git"}[t]||"Kiro";
            closeSB();
        }

        // ── Sidebar ──
        function openSB(){$(".sidebar").classList.add("open");$("#sb-overlay").classList.remove("hidden");}
        function closeSB(){$(".sidebar").classList.remove("open");$("#sb-overlay").classList.add("hidden");}

        // ── Tema ──
        function toggleTheme(){const d=document.documentElement,dk=d.dataset.theme==="dark";d.dataset.theme=dk?"light":"dark";$("#theme-label").textContent=dk?"Modo Escuro":"Modo Claro";$("#theme-icon").className=dk?"fas fa-sun":"fas fa-moon";localStorage.setItem("kiro-theme",d.dataset.theme);}
        (function(){const s=localStorage.getItem("kiro-theme");if(s){document.documentElement.dataset.theme=s;$("#theme-label").textContent=s==="dark"?"Modo Claro":"Modo Escuro";$("#theme-icon").className=s==="dark"?"fas fa-moon":"fas fa-sun";}})();

        // ── Voz ──
        function setupVoice(){
            voice.mod=new VoiceModule();
            const vs=$("#voice-sheet"),ts=$("#tts-sheet"),dot=$("#voice-dot"),txt=$("#transcript-text"),btnS=$("#btn-voice-send");
            voice.mod.onTranscript=async(text,fin)=>{
                if(fin){voice.last=text;txt.textContent=text;txt.className="";btnS.disabled=false;
                    if($("#voice-auto-send").checked){sendMsg(text);vs.classList.add("hidden");voice.mod.stopListening();}
                }else{txt.textContent=text;txt.className="muted";}
            };
            voice.mod.onStateChange=s=>{
                const m=$("#btn-mic-chat");
                if(s==="listening"){m.classList.add("on");dot.classList.add("on");$("#voice-status").textContent="Ouvindo...";}
                else{m.classList.remove("on");dot.classList.remove("on");$("#voice-status").textContent="Toque para falar";}
            };
            $("#btn-mic-chat").addEventListener("click",()=>{vs.classList.toggle("hidden");ts.classList.add("hidden");if(!vs.classList.contains("hidden"))voice.mod.startListening();else voice.mod.stopListening();});
            $("#btn-close-voice").addEventListener("click",()=>{vs.classList.add("hidden");voice.mod.stopListening();});
            dot.addEventListener("click",()=>voice.mod.toggleListening());
            btnS.addEventListener("click",()=>{if(voice.last){sendMsg(voice.last);vs.classList.add("hidden");}});
            $("#btn-voice-clear").addEventListener("click",()=>{voice.last="";txt.textContent="Sua fala aparecerá aqui...";txt.className="muted";btnS.disabled=true;});
            $("#voice-lang").addEventListener("change",e=>voice.mod.setLanguage(e.target.value));
            $("#btn-voice-page").addEventListener("click",()=>{vs.classList.remove("hidden");ts.classList.add("hidden");voice.mod.startListening();});
            $("#btn-tts-page").addEventListener("click",()=>{ts.classList.remove("hidden");vs.classList.add("hidden");});
            $("#btn-close-tts").addEventListener("click",()=>{ts.classList.add("hidden");voice.mod.stopSpeaking();});
            $("#btn-tts-play").addEventListener("click",()=>{const t=$("#tts-text").value.trim();if(t)voice.mod.speak(t);});
            $("#btn-tts-stop").addEventListener("click",()=>voice.mod.stopSpeaking());
            $("#btn-tts-paste").addEventListener("click",async()=>{try{$("#tts-text").value=await navigator.clipboard.readText();}catch(e){$("#tts-text").focus();}});
        }

        // ── Setup ──
        $("#btn-menu").addEventListener("click",openSB);
        $("#btn-sb-close").addEventListener("click",closeSB);
        $("#sb-overlay").addEventListener("click",closeSB);
        $$(".sb-link[data-tab]").forEach(b=>b.addEventListener("click",()=>switchTab(b.dataset.tab)));
        $$(".action-btn[data-msg]").forEach(b=>b.addEventListener("click",()=>{sendMsg(b.dataset.msg);switchTab("chat");}));
        $$(".chip-btn[data-msg]").forEach(b=>b.addEventListener("click",()=>sendMsg(b.dataset.msg)));
        $("#btn-theme").addEventListener("click",toggleTheme);
        $("#btn-send").addEventListener("click",()=>sendMsg($("#chat-input").value.trim()));
        $("#chat-input").addEventListener("keydown",e=>{if(e.key==="Enter")sendMsg($("#chat-input").value.trim());});

        async function switchProject(name){
            if(name===currentProject){switchTab("chat");closeSB();return;}
            // Salva mensagens do projeto atual
            chatHistories[currentProject]=$("#chat-messages").innerHTML;
            // Troca
            currentProject=name;
            $("#project-badge").textContent=name;
            $("#git-project-name").textContent=name;
            $("#git-output").style.display="none";
            $("#commit-row").style.display="none";
            updateChatList();
            // Restaura mensagens do novo projeto
            const saved=chatHistories[name];
            if(saved && saved.length>0){
                $("#chat-messages").innerHTML=saved;
                const w=$("#chat-welcome");if(w)w.style.display="none";
            }else{
                $("#chat-messages").innerHTML="";
                const w=$("#chat-welcome");if(w)w.style.display="";
                addMsg("system","Projeto: "+name);
            }
            switchTab("chat");
        }
        loadProjects();
        setupVoice();

        // ── Git ──
        function showGitOutput(text){const el=$("#git-output");el.style.display="block";el.textContent=text;}
        $("#git-project-name").textContent=currentProject;

        $("#btn-git-status").addEventListener("click",async()=>{
            showGitOutput("Verificando...");
            try{
                const r=await(await fetch("/api/git/status",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({project:currentProject})})).json();
                showGitOutput(r.output||r.error||"Limpo — nada para commitar");
            }catch(e){showGitOutput("Erro: "+e.message);}
        });

        $("#btn-git-push").addEventListener("click",()=>{
            $("#commit-row").style.display="flex";
            $("#git-project-name").textContent=currentProject;
        });

        $("#btn-git-confirm-push").addEventListener("click",async()=>{
            const msg=$("#commit-msg").value.trim()||"update via Kiro Mobile";
            showGitOutput("Fazendo push...");
            try{
                const r=await(await fetch("/api/git/push",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({project:currentProject,message:msg})})).json();
                showGitOutput(r.output||r.error);
                $("#commit-row").style.display="none";
            }catch(e){showGitOutput("Erro: "+e.message);}
        });

        $("#btn-git-pull").addEventListener("click",async()=>{
            showGitOutput("Fazendo pull...");
            try{
                const r=await(await fetch("/api/git/pull",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({project:currentProject})})).json();
                showGitOutput(r.output||r.error);
            }catch(e){showGitOutput("Erro: "+e.message);}
        });
    </script>
</body>
</html>
