<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#212121">
    <title>Kiro Mobile</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- ═══ Tela de Conexão ═══ -->
    <div id="connect-screen" class="screen active">
        <div class="connect-container">
            <div class="connect-logo">
                <div class="logo-circle">
                    <i class="fas fa-bolt"></i>
                </div>
                <h1>Kiro Mobile</h1>
                <p>Acesse seu workspace de qualquer lugar</p>
            </div>
            <div class="connect-form">
                <div class="form-field">
                    <input type="text" id="vnc-host" value="{{ vnc_host }}" placeholder="Host (ex: 144.91.105.101)">
                </div>
                <div class="form-row">
                    <div class="form-field">
                        <input type="number" id="vnc-port" value="{{ websockify_port }}" placeholder="Porta">
                    </div>
                    <div class="form-field">
                        <input type="password" id="vnc-password" value="{{ vnc_password }}" placeholder="Senha">
                    </div>
                </div>
                <button id="btn-connect" class="btn-connect">
                    Conectar <i class="fas fa-arrow-right"></i>
                </button>
            </div>
            <div id="connect-status" class="connect-status"></div>
        </div>
    </div>

    <!-- ═══ Tela Principal ═══ -->
    <div id="main-screen" class="screen">
        <!-- Sidebar -->
        <div id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="brand-icon"><i class="fas fa-bolt"></i></div>
                    <span>Kiro Mobile</span>
                </div>
                <button id="btn-close-sidebar" class="icon-btn"><i class="fas fa-times"></i></button>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-label">Visualização</div>
                <button class="sidebar-item active" data-view="desktop">
                    <i class="fas fa-desktop"></i> Desktop Remoto
                </button>
                <button class="sidebar-item" data-view="focus">
                    <i class="fas fa-crop-simple"></i> Modo Foco
                </button>
                <button class="sidebar-item" data-view="actions">
                    <i class="fas fa-bolt"></i> Ações Rápidas
                </button>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-label">Projetos</div>
                <div class="project-item">
                    <i class="fas fa-folder"></i> interface-kiro
                </div>
                <div class="project-item">
                    <i class="fas fa-folder"></i> veo3-tool
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-label">Qualidade</div>
                <div class="quality-row">
                    <button class="chip active" data-quality="auto">Auto</button>
                    <button class="chip" data-quality="high">Alta</button>
                    <button class="chip" data-quality="medium">Média</button>
                    <button class="chip" data-quality="low">Baixa</button>
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="btn-theme" class="sidebar-item">
                    <i class="fas fa-moon"></i> <span id="theme-label">Modo Claro</span>
                </button>
                <button id="btn-disconnect-sidebar" class="sidebar-item danger">
                    <i class="fas fa-power-off"></i> Desconectar
                </button>
            </div>
        </div>
        <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="topbar">
                <button id="btn-sidebar" class="icon-btn"><i class="fas fa-bars"></i></button>
                <span class="topbar-title" id="topbar-title">Desktop Remoto</span>
                <div class="topbar-actions">
                    <button id="btn-fullscreen-top" class="icon-btn"><i class="fas fa-expand"></i></button>
                </div>
            </div>

            <!-- View: Desktop -->
            <div id="view-desktop" class="view active">
                <div id="vnc-container">
                    <div id="vnc-screen"></div>
                    <div id="loading-overlay">
                        <div class="loader"></div>
                        <p>Conectando...</p>
                    </div>
                </div>
            </div>

            <!-- View: Foco -->
            <div id="view-focus" class="view">
                <div class="focus-tabs">
                    <button class="focus-tab active" data-area="editor"><i class="fas fa-code"></i> Editor</button>
                    <button class="focus-tab" data-area="explorer"><i class="fas fa-folder"></i> Arquivos</button>
                    <button class="focus-tab" data-area="terminal"><i class="fas fa-terminal"></i> Terminal</button>
                    <button class="focus-tab" data-area="chat"><i class="fas fa-robot"></i> Kiro AI</button>
                </div>
                <div id="focus-viewport">
                    <canvas id="focus-canvas"></canvas>
                </div>
            </div>

            <!-- View: Ações Rápidas -->
            <div id="view-actions" class="view">
                <div class="actions-container">
                    <div class="actions-header">
                        <div class="actions-icon"><i class="fas fa-bolt"></i></div>
                        <h2>Ações Rápidas</h2>
                        <p>Envie comandos para o Kiro</p>
                    </div>
                    <div class="actions-grid">
                        <button class="action-card" data-shortcut="ctrl+shift+i">
                            <i class="fas fa-robot"></i>
                            <span>Chat Kiro</span>
                        </button>
                        <button class="action-card" data-shortcut="ctrl+shift+p">
                            <i class="fas fa-terminal"></i>
                            <span>Paleta de Comandos</span>
                        </button>
                        <button class="action-card" data-shortcut="ctrl+p">
                            <i class="fas fa-file-code"></i>
                            <span>Abrir Arquivo</span>
                        </button>
                        <button class="action-card" data-shortcut="ctrl+grave">
                            <i class="fas fa-terminal"></i>
                            <span>Terminal</span>
                        </button>
                        <button class="action-card" data-shortcut="ctrl+s">
                            <i class="fas fa-save"></i>
                            <span>Salvar</span>
                        </button>
                        <button class="action-card" data-shortcut="ctrl+z">
                            <i class="fas fa-undo"></i>
                            <span>Desfazer</span>
                        </button>
                        <button class="action-card" data-shortcut="ctrl+shift+z">
                            <i class="fas fa-redo"></i>
                            <span>Refazer</span>
                        </button>
                        <button class="action-card" data-shortcut="ctrl+b">
                            <i class="fas fa-columns"></i>
                            <span>Sidebar</span>
                        </button>
                        <button class="action-card" data-shortcut="ctrl+f">
                            <i class="fas fa-search"></i>
                            <span>Buscar</span>
                        </button>
                        <button class="action-card" data-shortcut="ctrl+c">
                            <i class="fas fa-copy"></i>
                            <span>Copiar</span>
                        </button>
                        <button class="action-card" data-shortcut="ctrl+v">
                            <i class="fas fa-paste"></i>
                            <span>Colar</span>
                        </button>
                        <button class="action-card" data-shortcut="escape">
                            <i class="fas fa-xmark"></i>
                            <span>Escape</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Bottom Bar (floating) -->
            <div class="bottom-bar">
                <button id="btn-keyboard" class="fab" aria-label="Teclado">
                    <i class="fas fa-keyboard"></i>
                </button>
                <button id="btn-mic" class="fab mic" aria-label="Microfone">
                    <i class="fas fa-microphone"></i>
                </button>
                <button id="btn-tts" class="fab tts" aria-label="Ouvir">
                    <i class="fas fa-volume-up"></i>
                </button>
            </div>
            <input type="text" id="hidden-keyboard-input" autocomplete="off" autocorrect="off"
                   autocapitalize="off" spellcheck="false">
        </div>
    </div>

    <!-- Voice Panel -->
    <div id="voice-panel" class="bottom-sheet hidden">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
            <span id="voice-status-text">Toque para falar</span>
            <button id="btn-close-voice" class="icon-btn"><i class="fas fa-times"></i></button>
        </div>
        <div class="voice-area">
            <div id="voice-indicator" class="voice-circle">
                <i class="fas fa-microphone"></i>
            </div>
        </div>
        <div id="voice-transcript" class="transcript-box">
            <p id="transcript-text" class="placeholder">Sua fala aparecerá aqui...</p>
        </div>
        <div class="sheet-actions">
            <button id="btn-voice-send" class="btn-pill primary" disabled>
                <i class="fas fa-paper-plane"></i> Enviar
            </button>
            <button id="btn-voice-clear" class="btn-pill">
                <i class="fas fa-eraser"></i> Limpar
            </button>
        </div>
        <div class="sheet-options">
            <label><input type="checkbox" id="voice-auto-send" checked> Enviar automaticamente</label>
            <select id="voice-lang">
                <option value="pt-BR" selected>Português</option>
                <option value="en-US">English</option>
                <option value="es-ES">Español</option>
            </select>
        </div>
    </div>

    <!-- TTS Panel -->
    <div id="tts-panel" class="bottom-sheet hidden">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
            <span>Texto para Áudio</span>
            <button id="btn-close-tts" class="icon-btn"><i class="fas fa-times"></i></button>
        </div>
        <textarea id="tts-text" class="tts-input" placeholder="Cole o texto que deseja ouvir..."></textarea>
        <div class="sheet-actions">
            <button id="btn-tts-play" class="btn-pill primary"><i class="fas fa-play"></i> Ouvir</button>
            <button id="btn-tts-stop" class="btn-pill" disabled><i class="fas fa-stop"></i> Parar</button>
            <button id="btn-tts-paste" class="btn-pill"><i class="fas fa-clipboard"></i> Colar</button>
        </div>
    </div>

    <script type="module">
        import RFB from '/static/vendor/noVNC/core/rfb.js';
        window.RFB = RFB;

        // Carrega bridge depois do RFB estar disponível
        import('./static/js/voice.js');
        import('./static/js/bridge.js');
    </script>
</body>
</html>
